# - Mix local NRW hybrid and full-remote roles by overall fit, not by work mode alone.
# - Write reports under D:\Job Search 2026.
# - Maintain D:\Job Search 2026\seen-vacancies.json.
# - Send email report through connected Gmail.
# - Do not generate tailored CVs automatically.
