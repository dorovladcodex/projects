# Repository copy of the Codex automation metadata.
# The live full prompt is stored in the local Codex automation file:
# C:\Users\dorov\.codex\automations\nrw-senior-data-oracle-job-monitor\automation.toml
#
# Core behavior:
# - Search NRW/Germany remote Senior Data Engineer, Oracle PL/SQL, ERP/WMS, Azure Databricks roles.
